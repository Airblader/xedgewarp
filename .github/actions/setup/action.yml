name: Set up build & test environment
description: Install build dependencies, X server tooling, and Perl test modules.

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          pkg-config \
          libxcb1-dev \
          libxcb-composite0-dev \
          libxcb-icccm4-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxcb-randr0-dev \
          libxcb-util-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxi-dev \
          libxfixes-dev \
          asciidoc \
          xmlto \
          xauth \
          libtest-simple-perl \
          cpanminus \
          xcb-proto \
          xvfb \
          xserver-xephyr

    - name: Cache CPAN modules
      uses: actions/cache@v4
      with:
        path: |
          ~/perl5
          ~/.cpanm
        key: cpanm-${{ runner.os }}-x11xcb-ipcsystemsimple-v1

    - name: Install CPAN modules
      shell: bash
      run: |
        sudo cpanm --notest --quiet X11::XCB IPC::System::Simple
