name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2). The Makefile VERSION must match.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, test, tag and publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "::error::Version '$version' is not a valid X.Y or X.Y.Z version."
              exit 1
            fi
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          makefile_version="$(awk '/^VERSION[[:space:]]*=/ { print $3; exit }' Makefile)"
          if [ "$version" != "$makefile_version" ]; then
            echo "::error::Requested version '$version' does not match Makefile VERSION '$makefile_version'."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag (local)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists."
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Test
        run: make test

      - name: Build manpages
        run: make mans

      - name: Create source tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git archive \
            --format=tar.gz \
            --prefix="xedgewarp-${VERSION}/" \
            -o "xedgewarp-${VERSION}.tar.gz" \
            "${TAG}"

      - name: Push annotated tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: git push origin "$TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: xedgewarp-${{ steps.version.outputs.version }}.tar.gz
