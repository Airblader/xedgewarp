name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up environment
      uses: ./.github/actions/setup

    - name: Build
      run: make

    - name: Install (smoke test)
      run: make DESTDIR=$PWD/_install install

    - name: Test
      run: make test
