name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb1-dev \
          libxcb-randr0-dev \
          libxcb-util-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxi-dev \
          libxfixes-dev \
          libxrandr-dev \
          asciidoc \
          xmlto

    - name: Build
      run: make

    - name: Install (smoke test)
      run: make DESTDIR=$PWD/_install install